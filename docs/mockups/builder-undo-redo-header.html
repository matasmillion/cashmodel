<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Builder header — Undo/Redo (mockup)</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet"/>
<style>
  :root{--slate:#3A3A3A;--salt:#F5F0E8;--stone:#716F70;}
  body{margin:0;background:#cfc9bd;font-family:'General Sans','Inter','Helvetica Neue',Arial,sans-serif;padding:30px;}
  .cap{font-size:12px;font-weight:600;color:#5b574d;margin-bottom:10px;}
  /* mirrors TechPackBuilder header exactly */
  .hdr{background:var(--slate);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-radius:5px;box-shadow:0 6px 22px rgba(0,0,0,.18);}
  .l,.r{display:flex;align-items:center;}
  .l{gap:12px;} .r{gap:14px;}
  .ghost{background:rgba(255,255,255,0.1);border:none;color:var(--salt);padding:5px 10px;border-radius:3px;font-size:10px;cursor:pointer;display:flex;align-items:center;gap:4px;}
  .ghost.dis{opacity:.4;cursor:default;}
  .sep{width:1px;height:18px;background:rgba(255,255,255,0.18);margin:0 2px;}
  .ttl1{font-family:'Cormorant Garamond',Georgia,serif;color:var(--salt);font-size:14px;font-weight:700;letter-spacing:.5px;}
  .ttl2{color:var(--salt);font-size:14px;margin-top:2px;letter-spacing:.2px;}
  .save{background:var(--salt);color:var(--slate);border:none;padding:5px 12px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.04em;display:flex;align-items:center;gap:4px;cursor:pointer;}
  .vend{background:rgba(255,255,255,0.1);border:none;color:var(--salt);padding:5px 12px;border-radius:3px;font-size:10px;cursor:pointer;}
  svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
</style></head>
<body>
  <div class="cap">MOCKUP · new Undo / Redo buttons in the builder header (matches the existing Back / Restore-points ghost buttons)</div>
  <div class="hdr">
    <div class="l">
      <button class="ghost"><svg viewBox="0 0 24 24"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Back</button>
      <button class="ghost"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg> Restore points</button>
      <div class="sep"></div>
      <button class="ghost" title="Undo (Cmd/Ctrl+Z)"><svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg> Undo</button>
      <button class="ghost dis" title="Nothing to redo"><svg viewBox="0 0 24 24"><path d="m15 14 5-5-5-5"/><path d="M20 9H9.5A5.5 5.5 0 0 0 4 14.5v0A5.5 5.5 0 0 0 9.5 20H13"/></svg> Redo</button>
      <div style="margin-left:6px">
        <div class="ttl1">FOREIGN RESOURCE</div>
        <div class="ttl2">FW26-BB-ZH-0001</div>
      </div>
    </div>
    <div class="r">
      <button class="vend">Send to vendor</button>
      <button class="save"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg> Save</button>
    </div>
  </div>
  <div class="cap" style="margin-top:14px;">Undo is enabled here; Redo is shown dimmed (nothing to redo yet) — the real buttons gray out the same way when there's nothing to step to.</div>
</body></html>
